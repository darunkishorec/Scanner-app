<!DOCTYPE html>
<html>
<head>
    <title>Test SmartCart Backend</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #0070f3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #0051cc;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>🛒 SmartCart Backend Test</h1>
    <p><strong>Backend URL:</strong> https://smartcart-backend-xw1w.onrender.com</p>
    
    <button onclick="testHealth()">1. Test Health</button>
    <button onclick="initCarts()">2. Initialize 5 Carts</button>
    <button onclick="listCarts()">3. List All Carts</button>
    
    <div id="result"></div>

    <script>
        const API_URL = 'https://smartcart-backend-xw1w.onrender.com';

        function showResult(data, isError = false) {
            const div = document.getElementById('result');
            div.className = 'result ' + (isError ? 'error' : 'success');
            div.textContent = JSON.stringify(data, null, 2);
        }

        async function testHealth() {
            try {
                const response = await fetch(`${API_URL}/api/health`);
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({error: error.message}, true);
            }
        }

        async function initCarts() {
            try {
                const response = await fetch(`${API_URL}/api/admin/reset-all-carts`, {
                    method: 'POST'
                });
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({error: error.message}, true);
            }
        }

        async function listCarts() {
            try {
                const response = await fetch(`${API_URL}/api/carts`);
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({error: error.message}, true);
            }
        }
    </script>
</body>
</html>
