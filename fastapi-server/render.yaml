services:
  - type: web
    name: smartcart-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DB_NAME
        value: smartcart
      - key: STORE_ID
        value: store-01
      - key: TOKEN_EXPIRE_MINUTES
        value: 10
      - key: PYTHON_VERSION
        value: 3.11.0
